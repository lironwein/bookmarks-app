<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookmark Manager</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7f2;
        --panel: #ffffff;
        --text: #20251f;
        --muted: #687165;
        --line: #dce2d5;
        --accent: #1f7a69;
        --accent-dark: #155c50;
        --danger: #c43b3b;
        --danger-soft: #feecec;
        --shadow: 0 18px 50px rgba(35, 48, 33, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(31, 122, 105, 0.12), transparent 42%),
          var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(1080px, calc(100% - 32px));
        margin: 0 auto;
        padding: 42px 0;
      }

      .topbar {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 5vw, 4.2rem);
        line-height: 0.96;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 0;
        max-width: 560px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.55;
      }

      .count {
        min-width: 128px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        padding: 14px 16px;
        text-align: center;
      }

      .count strong {
        display: block;
        font-size: 1.8rem;
        line-height: 1;
      }

      .count span {
        color: var(--muted);
        font-size: 0.82rem;
      }

      .layout {
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 18px;
        align-items: start;
      }

      form,
      .bookmarks {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow);
      }

      form {
        display: grid;
        gap: 16px;
        padding: 20px;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fbfcfa;
        color: var(--text);
        font: inherit;
        padding: 12px 13px;
        outline: none;
        transition:
          border-color 0.16s ease,
          box-shadow 0.16s ease,
          background 0.16s ease;
      }

      input:focus {
        border-color: var(--accent);
        background: #ffffff;
        box-shadow: 0 0 0 4px rgba(31, 122, 105, 0.14);
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 7px;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        transition:
          transform 0.14s ease,
          background 0.14s ease,
          border-color 0.14s ease;
      }

      button:active {
        transform: translateY(1px);
      }

      .primary {
        background: var(--accent);
        color: #ffffff;
      }

      .primary:hover {
        background: var(--accent-dark);
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--line);
        padding: 16px 18px;
      }

      .toolbar h2 {
        margin: 0;
        font-size: 1rem;
      }

      .clear {
        border: 1px solid #f0bbbb;
        background: var(--danger-soft);
        color: var(--danger);
        padding: 0 14px;
      }

      .clear:hover:not(:disabled) {
        border-color: var(--danger);
      }

      .clear:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .list {
        display: grid;
        gap: 0;
      }

      .bookmark {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 132px 44px;
        gap: 14px;
        align-items: center;
        min-height: 78px;
        border-bottom: 1px solid var(--line);
        padding: 14px 18px;
      }

      .bookmark:last-child {
        border-bottom: 0;
      }

      .bookmark-title {
        display: block;
        width: fit-content;
        max-width: 100%;
        color: var(--text);
        font-size: 1rem;
        font-weight: 800;
        text-decoration: none;
        overflow-wrap: anywhere;
      }

      .bookmark-title:hover {
        color: var(--accent);
        text-decoration: underline;
      }

      .bookmark-url {
        margin-top: 5px;
        color: var(--muted);
        font-size: 0.9rem;
        overflow-wrap: anywhere;
      }

      .category {
        justify-self: start;
        max-width: 100%;
        border: 1px solid #c8d9d1;
        border-radius: 999px;
        background: #edf7f4;
        color: #1b6659;
        padding: 7px 10px;
        font-size: 0.8rem;
        font-weight: 800;
        overflow-wrap: anywhere;
      }

      .delete {
        width: 44px;
        border: 1px solid transparent;
        background: transparent;
        color: var(--danger);
        font-size: 1.35rem;
      }

      .delete:hover {
        border-color: #f0bbbb;
        background: var(--danger-soft);
      }

      .empty {
        padding: 48px 18px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 820px) {
        main {
          width: min(100% - 24px, 620px);
          padding: 26px 0;
        }

        .topbar,
        .layout {
          display: grid;
          grid-template-columns: 1fr;
        }

        .count {
          text-align: left;
        }

        .bookmark {
          grid-template-columns: minmax(0, 1fr) 44px;
        }

        .category {
          grid-column: 1 / -1;
          grid-row: 2;
        }

        .delete {
          grid-column: 2;
          grid-row: 1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="topbar">
        <div>
          <h1>Bookmarks</h1>
          <p class="subtitle">
            Keep useful links organized by title, URL, and category.
          </p>
        </div>
        <div class="count" aria-live="polite">
          <strong id="bookmarkCount">0</strong>
          <span>saved links</span>
        </div>
      </header>

      <section class="layout" aria-label="Bookmark manager">
        <form id="bookmarkForm">
          <label>
            Title
            <input
              id="titleInput"
              name="title"
              type="text"
              placeholder="MDN Web Docs"
              autocomplete="off"
              required
            />
          </label>

          <label>
            URL
            <input
              id="urlInput"
              name="url"
              type="url"
              placeholder="https://developer.mozilla.org"
              autocomplete="off"
              required
            />
          </label>

          <label>
            Category
            <input
              id="categoryInput"
              name="category"
              type="text"
              placeholder="Reference"
              autocomplete="off"
              required
            />
          </label>

          <button class="primary" type="submit">Add bookmark</button>
        </form>

        <section class="bookmarks" aria-label="Saved bookmarks">
          <div class="toolbar">
            <h2>Your links</h2>
            <button class="clear" id="clearAllButton" type="button">
              Delete all
            </button>
          </div>
          <div class="list" id="bookmarkList"></div>
        </section>
      </section>
    </main>

    <script>
      const storageKey = "bookmark-manager-items";
      const form = document.querySelector("#bookmarkForm");
      const titleInput = document.querySelector("#titleInput");
      const urlInput = document.querySelector("#urlInput");
      const categoryInput = document.querySelector("#categoryInput");
      const bookmarkList = document.querySelector("#bookmarkList");
      const clearAllButton = document.querySelector("#clearAllButton");
      const bookmarkCount = document.querySelector("#bookmarkCount");

      let bookmarks = JSON.parse(localStorage.getItem(storageKey) || "[]");

      function saveBookmarks() {
        localStorage.setItem(storageKey, JSON.stringify(bookmarks));
      }

      function normalizeUrl(url) {
        const trimmed = url.trim();
        if (/^https?:\/\//i.test(trimmed)) {
          return trimmed;
        }

        return `https://${trimmed}`;
      }

      function renderBookmarks() {
        bookmarkList.innerHTML = "";
        bookmarkCount.textContent = bookmarks.length;
        clearAllButton.disabled = bookmarks.length === 0;

        if (bookmarks.length === 0) {
          const empty = document.createElement("p");
          empty.className = "empty";
          empty.textContent = "No bookmarks yet.";
          bookmarkList.append(empty);
          return;
        }

        bookmarks.forEach((bookmark) => {
          const row = document.createElement("article");
          row.className = "bookmark";

          const details = document.createElement("div");

          const link = document.createElement("a");
          link.className = "bookmark-title";
          link.href = bookmark.url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.textContent = bookmark.title;

          const url = document.createElement("div");
          url.className = "bookmark-url";
          url.textContent = bookmark.url;

          const category = document.createElement("span");
          category.className = "category";
          category.textContent = bookmark.category;

          const deleteButton = document.createElement("button");
          deleteButton.className = "delete";
          deleteButton.type = "button";
          deleteButton.setAttribute("aria-label", `Delete ${bookmark.title}`);
          deleteButton.textContent = "×";
          deleteButton.addEventListener("click", () => {
            bookmarks = bookmarks.filter((item) => item.id !== bookmark.id);
            saveBookmarks();
            renderBookmarks();
          });

          details.append(link, url);
          row.append(details, category, deleteButton);
          bookmarkList.append(row);
        });
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        bookmarks.unshift({
          id: crypto.randomUUID(),
          title: titleInput.value.trim(),
          url: normalizeUrl(urlInput.value),
          category: categoryInput.value.trim(),
        });

        saveBookmarks();
        renderBookmarks();
        form.reset();
        titleInput.focus();
      });

      clearAllButton.addEventListener("click", () => {
        if (bookmarks.length === 0) {
          return;
        }

        bookmarks = [];
        saveBookmarks();
        renderBookmarks();
      });

      renderBookmarks();
    </script>
  </body>
</html>
